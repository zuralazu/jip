name: jip
description: "Car Inspection"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  http: ^0.13.6
  flutter_dotenv: ^5.1.0
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  url_launcher: ^6.3.0
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  google_ml_kit: ^0.21.0
  flutter_image_compress: ^2.2.0
  path_provider: ^2.1.2
  path: ^1.9.0
  open_file: ^3.3.2
  share_plus: ^7.2.2
  permission_handler: ^11.3.1

  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_mlkit_text_recognition: ^0.15.1

dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"

flutter:

  uses-material-design: true
  assets:
    - assets/images/logo.png
    - .env

